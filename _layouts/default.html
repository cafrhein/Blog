<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

    <nav>
        <a href="{{ '/' | relative_url }}"><i class="fas fa-home"></i>Inicio</a>
        <a href="{{ '/blog.html' | relative_url }}"><i class="fas fa-rss"></i>Blog</a>
        <a href="{{ '/contacto.html' | relative_url }}"><i class="fas fa-envelope"></i>Contacto</a>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>© {{ "now" | date: "%Y" }} {{ site.title }} · Ciudad de México</p>
    </footer>

</body>
</html>
